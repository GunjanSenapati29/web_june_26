<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transform Examples</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 40px;
            height: 100vh;
        }

        .box {
            width: 180px;
            height: 180px;
            background-color: royalblue;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;

            /* Animation */
            transition: 0.5s;
        }

        /* Scale Example */
        .scale:hover {
            transform: scale(1.2);
        }

        /* Rotate Example */
        .rotate:hover {
            transform: rotate(360deg);
        }

        /* Translate Example */
        .translate:hover {
            transform: translate(50px, -30px);
        }

        /* Skew Example */
        .skew:hover {
            transform: skew(20deg, 10deg);
        }
    </style>
</head>
<body>

    <div class="box scale">
        Scale
    </div>

    <div class="box rotate">
        Rotate
    </div>

    <div class="box translate">
        Translate
    </div>

    <div class="box skew">
        Skew
    </div>

</body>
</html>
