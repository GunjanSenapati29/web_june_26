<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Internal CSS - Style Tag -->
    <style>
        p {
            color: rgb(34, 22, 116);
            background-color: lightblue;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Inline CSS -->
    <h1 style="color: black; background-color: pink;">CSS is Awesome</h1>
    <h1 style="color: black; background-color: pink;">Heading 1</h1>

    <!-- Internal CSS -->
    <p>Java Technocart</p>
    <p>Rashmi Kant Das</p>


    <!-- External CSS -->
    <div>Lorem, ipsum dolor. </div>
    <div>Lorem ipsum dolor sit amet.</div>

</body>

</html>

<!-- 
CSS can be linked  in 3 ways:-
        i. inline -> NR
        ii. internal CSS -> NR
        iii. external CSS -> R

-->
