<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            box-sizing: border-box;
        }

        div{
            width: 200px;
            height: 200px;
            border-bottom: 2px solid black;
            border-radius: 5px 5px 0 0;

            background-size: cover;
            background-position: center;
        }

        .photo1{
            background-image: url("./Samsung\ Zfold\ 7.webp");
        }

        .photo2{
            background-image: url("./IPhone\ 17.jpg");
        }

        section{
            width: 200px;
            border: 2px solid black;
            border-radius: 5px;
            background-color: rgba(211,211,211,0.29);
            padding: 3px;

            display: inline-block;
            margin-right: 15px;
            vertical-align: top;

            transition: all .5s ease .1s;
        }

        section:hover{
            box-shadow: 2px 2px 8px black;
            transform: translatey(-5px);
        }

        h4{
            margin: 10px 0 5px 8px; /*top right bottom left*/
        }

        p{
            margin: 5px 0 10px 8px;
            color: gray;
        }
    </style>
</head>

<body>

    <section>
        <div class="photo1"></div>
        <h4>Samsung Zfold 7</h4>
        <p>Description</p>
        <p>₹1,86,999</p>
    </section>

    <section>
        <div class="photo2"></div>
        <h4>Iphone 17</h4>
        <p>Description</p>
        <p>₹1,49,900</p>
    </section>

</body>
</html>
