<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- table>th+(tr>td)*3 -->
    <!-- table>(th*2)+(tr>(td*2))*3 -->
    <table border="2">
        <caption>Student Marks</caption>

        <thead>
            <tr>
                <th>Subject</th>
                <th>Marks</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Science</td>
                <td>90</td>
            </tr>
            <tr>
                <td>English</td>
                <td>80</td>
            </tr>
            <tr>
                <td>Math</td>
                <td>70</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="2">Total Marks: 240</td>
            </tr>
        </tfoot>
    </table>
</body>

</html>
