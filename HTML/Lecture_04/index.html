<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Input</title>
</head>

<body>
    <h2>Java Application Form</h2>

    <form action="#">
        <!-- Text Field -->
        <label for="fullname">Full Name:</label>
        <input type="text" name="fullname" placeholder="Enter Full Name" id="fullname">

        <br> <br>

        <label for="email">Email Address:</label>
        <input type="email" name="email" placeholder="Enter email" id="email">

        <br> <br>

        <label for="p">Password:</label>
        <input type="password" name="password" placeholder="Enter Password" id="p">

        <br> <br>

        <label for="num">Phone No:</label>
        <input type="tel" name="PhoneNo" placeholder="Enter Phone No" id="num" maxlength="10" minlength="10">

        <br> <br>

        <label for="a">Age:</label>
        <input type="number" name="age" placeholder="Enter Age" id="a" min="18" max="60">

        <br> <br>

        <label for="d">Date Of Birth:</label>
        <input type="date" name="dob" placeholder="Enter DOB" id="d">

        <br> <br>

        <label for="i">Profile Image:</label>
        <input type="file" name="image" placeholder="Upload Profile Image" id="i" accept=".png,.jpg" multiple>

        <br> <br>

        <label for="g">Gender:</label>
        <input type="radio" name="gender" placeholder="Enter Gender" id="male" value="male"> <label
            for="male">Male</label>
        <input type="radio" name="gender" placeholder="Enter Gender" id="female" value="female"> <label
            for="female">Female</label>
        <input type="radio" name="gender" placeholder="Enter Gender" id="others" value="others"> <label
            for="others">Others</label>

        <br> <br>

        <label for="country">Country:</label>
        <select name="country" id="country">
            <option value="">Select</option>
            <option value="IN">India</option>
            <option value="US">United States</option>

        </select>

        <br> <br>

        <input type="checkbox" name="terms" id="terms">
        <label for="terms">I agree to terms and conditions</label>

        <br> <br>

        <button>Submit</button>

    </form>
</body>

</html>

<!--
    i. Key also known as QueryPara
    ii.  <label for="fullname">Full Name:</label>
         <input type="email" name="email" placeholder="Enter email" id="email">       
         
         The name of 'for' attribute must match with 'id' atttribute.
-->
