<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Incline Elements or Tags -->

    <!-- Alt + Shift + down arrow for copying selected texts. -->

    <h3 style="background-color: aqua;">Heading 3</h3>
    <b>Bold 1</b>
    <a href="i">Anchor Tag</a>
    <a href="https://google.com" target="_blank">Google</a>

    
     <div style="background-color: yellow;">
     <h3>Heading 3</h3>
     <b>Bold 1</b>
     <a href="i">Anchor Tag</a>
     </div>


     <span style="background-color: royalblue;">
        <i>HTML</i>
        <b>CSS</b>
        <h3>Gunjan Senapati</h3>
     </span>
    
     
</body>
</html>

<!-- Types of Attributes:-
     i. Local e.g., href =""
     ii. Global e.g., style = ""
     iii. Custom e.g., data = 
-->

<!-- Types of elements:-
    i. Block level elements: it takes complete width of webpage. e.g., <h1 .... h6>, <div>, etc.
    ii. Incline elements: it takes required space in webpage.  e.g., <a>, <i>, etc.

-->
